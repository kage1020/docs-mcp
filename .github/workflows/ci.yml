name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    name: ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - name: Install dependencies
        run: bun install --frozen-lockfile
      - name: Lint & format check
        run: bun run check
      - name: Typecheck
        run: bun run typecheck
      - name: Test
        run: bun run test

  bench:
    name: bench (regression guard)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - name: Install dependencies
        run: bun install --frozen-lockfile
      - name: Run benchmarks
        run: bun run bench
      - name: Compare to baseline
        run: bun run bench:diff bench-baseline.json bench-result.json --threshold 0.2
      - name: Upload bench result
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: bench-result-${{ github.run_id }}
          path: bench-result.json
          retention-days: 30
